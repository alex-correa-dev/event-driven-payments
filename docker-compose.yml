services:
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: edp-rabbitmq
    hostname: rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edp-network

  postgres-payment:
    image: postgres:15-alpine
    container_name: edp-postgres-payment
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - '5433:5432'
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
      - ./infra/postgres/payment/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d payment_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edp-network

  prometheus:
    image: prom/prometheus:latest
    container_name: edp-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - edp-network

volumes:
  rabbitmq_data:
  postgres_payment_data:
  prometheus_data:

networks:
  edp-network:
    driver: bridge
